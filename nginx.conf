# NAStool Web — nginx 部署配置
#
# 用法：
#   1. 构建前端：pnpm build （产物在 dist/）
#   2. 将本文件放到 nginx 配置目录（如 /etc/nginx/conf.d/nastool-web.conf）
#   3. 修改 server_name、root 和后端地址（upstream nastool_api）
#   4. nginx -t && nginx -s reload

# 后端 Flask 服务（nas-tools run.py 监听 3000 端口）
upstream nastool_api {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    server_name nastool.example.com;  # 改成你的域名或IP

    # 前端静态资源（Vue 构建产物）
    root /opt/nas-tools-web/dist;
    index index.html;

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1000;

    # 静态资源缓存（Vite 产物带 hash，可长期缓存）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- 反向代理：后端 API ----
    location /do {
        proxy_pass http://nastool_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 0;
    }

    location ~ ^/(login_json|logout_json)$ {
        proxy_pass http://nastool_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /dirlist {
        proxy_pass http://nastool_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/ {
        proxy_pass http://nastool_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /img {
        proxy_pass http://nastool_api;
        proxy_set_header Host $host;
    }

    location ~ ^/(backup|upload)$ {
        proxy_pass http://nastool_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 0;
    }

    location ~ ^/(wechat|plex|jellyfin|emby|telegram|subscribe)$ {
        proxy_pass http://nastool_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /static/ {
        proxy_pass http://nastool_api;
        proxy_set_header Host $host;
    }

    # ---- 前端 SPA ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /robots.txt {
        proxy_pass http://nastool_api;
    }
}